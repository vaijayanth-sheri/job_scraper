name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not configured."
            exit 1
          fi
          HF_SPACE_URL="https://Vaijayanth-sheri:${HF_TOKEN}@huggingface.co/spaces/Vaijayanth-sheri/Job_scraper"
          if git remote get-url space >/dev/null 2>&1; then
            git remote set-url space "$HF_SPACE_URL"
          else
            git remote add space "$HF_SPACE_URL"
          fi
          ATTEMPTS=3
          for ATTEMPT in $(seq 1 "$ATTEMPTS"); do
            PUSH_OUTPUT=$(git push --force space main 2>&1)
            PUSH_STATUS=$?
            echo "$PUSH_OUTPUT"
            if [ "$PUSH_STATUS" -eq 0 ]; then
              exit 0
            fi
            if ! echo "$PUSH_OUTPUT" | grep -Eq "returned error: (429|5[0-9]{2})"; then
              exit "$PUSH_STATUS"
            fi
            if [ "$ATTEMPT" -lt "$ATTEMPTS" ]; then
              sleep $((ATTEMPT * 10))
            fi
          done
          echo "::error::Failed to push to Hugging Face Hub after $ATTEMPTS attempts."
          exit 1
